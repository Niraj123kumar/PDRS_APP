<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - PDRS</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        body.dark-mode { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9; --text-muted: #94a3b8; --border-color: rgba(255,255,255,0.1); }
        .wrap { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
        
        /* Table Styles */
        .table-container { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: var(--radius); 
            overflow-x: auto; 
            margin-top: 1rem;
            box-shadow: var(--shadow);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--hover-bg); padding: 1rem; text-align: left; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border-color); }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        
        /* Zebra Striping & Hover */
        tbody tr:nth-child(even) { background: rgba(0,0,0,0.02); }
        .dark-mode tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        tbody tr:hover { background: var(--hover-bg) !important; transition: background 0.2s; }

        .filters { display: flex; gap: 1.5rem; align-items: flex-end; margin-bottom: 2rem; flex-wrap: wrap; background: var(--card-bg); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 200px; }
        .filter-group label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.25rem; }
        .filter-group select, .filter-group input { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background: var(--bg-color); 
            color: var(--text-color);
            font-size: 1rem;
            min-height: 44px;
        }

        @media (max-width: 768px) {
            .filters { flex-direction: column; align-items: stretch; gap: 1rem; }
            .filter-group { min-width: 100%; }
            .filter-group select, .filter-group input { font-size: 16px; } /* Prevent iOS zoom */
            
            .table-container { border: none; box-shadow: none; background: transparent; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid var(--border-color); margin-bottom: 1.5rem; border-radius: var(--radius); background: var(--card-bg); box-shadow: var(--shadow); padding: 0.5rem; }
            td { border: none; border-bottom: 1px solid var(--border-color); position: relative; padding-left: 45%; text-align: right; min-height: 44px; display: flex; align-items: center; justify-content: flex-end; }
            td:last-child { border-bottom: none; }
            td:before { position: absolute; left: 1rem; width: 40%; text-align: left; font-weight: 700; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
            td:nth-of-type(1):before { content: "Timestamp"; }
            td:nth-of-type(2):before { content: "Action"; }
            td:nth-of-type(3):before { content: "Resource"; }
            td:nth-of-type(4):before { content: "IP Address"; }
        }
    </style>
    <script>
        const savedTheme = localStorage.getItem('pdrs_theme');
        if (savedTheme === 'dark') document.documentElement.classList.add('dark-mode');
    </script>
</head>
<body class="animate-up">
    <nav class="navbar">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <h1 style="color: var(--primary-color); margin:0; display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-weight: 800;" onclick="window.location.href='/'">
                    <span style="font-size:1.5rem;">🛡️</span> PDRS
                </h1>
                <div style="display: flex; gap: 1.5rem;">
                    <a href="/admin.html" class="nav-link">Dashboard</a>
                    <a href="/audit.html" class="nav-link active">Audit Log</a>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div id="user-nav-info" style="display: flex; align-items: center; gap: 1rem;">
                    <div id="user-avatar" class="avatar-initials" style="width: 30px; height: 30px; font-size: 0.8rem;"></div>
                    <span id="nav-role-badge" class="role-badge">Admin</span>
                    <button onclick="auth.logout()" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
                </div>
                <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn" title="Toggle Theme">🌙</button>
                <a href="/student.html" class="btn" style="width: auto; background: none; color: var(--primary-color); border: 2px solid var(--primary-color); padding: 0.5rem 1.5rem;">View as Student</a>
            </div>
        </div>
    </nav>

    <div class="wrap">
        <div style="margin-bottom: 2rem;">
            <nav style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--text-muted); font-weight: 600;">
                <a href="/admin.html" style="color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 0.25rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Admin
                </a>
                <span>&gt;</span>
                <span style="color: var(--primary-color);">Audit Log</span>
            </nav>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <h2 style="font-weight: 800; color: var(--primary-color); font-size: 1.75rem;">System Audit Log</h2>
            <div style="display: flex; gap: 0.75rem;">
                <button onclick="loadAudit()" class="btn btn-secondary" style="width: auto; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
                <button id="export-btn" class="btn" style="width:auto; display: flex; align-items: center; gap: 0.5rem;" onclick="exportCSV()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export CSV
                </button>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="action-filter">Action</label>
                <select id="action-filter">
                    <option value="">All actions</option>
                    <option>LOGIN</option>
                    <option>LOGOUT</option>
                    <option>REGISTER</option>
                    <option>VIEW_SESSION</option>
                    <option>CREATE_SESSION</option>
                    <option>DELETE_ACCOUNT</option>
                    <option>ENABLE_TOTP</option>
                    <option>DISABLE_TOTP</option>
                    <option>VIEW_STUDENT</option>
                    <option>EXPORT_REPORT</option>
                    <option>CREATE_PANEL</option>
                    <option>JOIN_PANEL</option>
                    <option>END_PANEL</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="from-date">From Date</label>
                <input type="date" id="from-date">
            </div>
            <div class="filter-group">
                <label for="to-date">To Date</label>
                <input type="date" id="to-date">
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: flex-end;">
                <button id="apply-btn" class="btn" style="width:auto;" onclick="loadAudit()">Apply Filters</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Resource</th>
                        <th>IP Address</th>
                    </tr>
                </thead>
                <tbody id="audit-body"></tbody>
            </table>
        </div>
        <div id="audit-empty" style="display: none;"></div>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/api.js"></script>
    <script>
        auth.requireAuth();
        auth.requireRole('admin');

        let auditRows = [];

        async function loadAudit() {
            const applyBtn = document.getElementById('apply-btn');
            ui.setLoading(applyBtn, true);
            ui.showSkeleton('audit-body', 5, 'list');
            document.getElementById('audit-empty').style.display = 'none';

            try {
                const action = document.getElementById('action-filter').value;
                const from = document.getElementById('from-date').value;
                const to = document.getElementById('to-date').value;
                const params = new URLSearchParams();
                if (action) params.set('action', action);
                if (from) params.set('from', from);
                if (to) params.set('to', to);
                
                const res = await apiFetch(`/api/auth/audit?${params.toString()}`);
                if (!res.ok) throw new Error('Failed to fetch audit logs');
                
                auditRows = await res.json();
                
                if (auditRows.length === 0) {
                    document.getElementById('audit-body').innerHTML = '';
                    ui.showEmptyState('audit-empty', '📋', 'No logs found', 'Try adjusting your filters to see more results.', 'Clear Filters', '#');
                    const cta = document.querySelector('#audit-empty .btn');
                    if (cta) {
                        cta.onclick = (e) => {
                            e.preventDefault();
                            document.getElementById('action-filter').value = '';
                            document.getElementById('from-date').value = '';
                            document.getElementById('to-date').value = '';
                            loadAudit();
                        };
                    }
                    document.getElementById('audit-empty').style.display = 'block';
                } else {
                    document.getElementById('audit-body').innerHTML = auditRows.map(r => `
                        <tr>
                            <td>${new Date(r.created_at).toLocaleString()}</td>
                            <td><span class="status-badge" style="background: var(--primary-glow); color: var(--primary-color); border: 1px solid var(--primary-color);">${r.action}</span></td>
                            <td>${r.resource || '<span class="text-muted">-</span>'}</td>
                            <td><code>${r.ip_address || '-'}</code></td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('audit-body').innerHTML = '';
            } finally {
                ui.setLoading(applyBtn, false);
            }
        }

        function exportCSV() {
            if (auditRows.length === 0) {
                showToast('No data to export', 'warning');
                return;
            }
            const exportBtn = document.getElementById('export-btn');
            ui.setLoading(exportBtn, true);
            
            try {
                const lines = ['timestamp,action,resource,ip'];
                auditRows.forEach(r => lines.push(`"${new Date(r.created_at).toISOString()}","${r.action}","${r.resource || ''}","${r.ip_address || ''}"`));
                const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `audit-log-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(a.href);
                showToast('Export successful! ✅', 'success');
            } catch (err) {
                showToast('Export failed', 'error');
            } finally {
                ui.setLoading(exportBtn, false);
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('pdrs_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
        }

        if (localStorage.getItem('pdrs_theme') === 'dark') {
            document.getElementById('theme-btn').textContent = '☀️';
        }

        // Initialize Validation
        ui.initFormValidation(document.querySelector('.filters'));

        loadAudit();

        // Initialize Initials Avatar
        document.addEventListener('DOMContentLoaded', () => {
            const user = auth.getUser();
            if (user && user.name) {
                const avatar = document.getElementById('user-avatar');
                if (avatar) {
                    const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    avatar.textContent = initials;
                    avatar.style.background = `hsl(${user.name.length * 137.5 % 360}, 70%, 50%)`;
                }
            }
        });
    </script>
</body>
</html>
