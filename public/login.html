<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PDRS</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        body { display: flex; flex-direction: column; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9; --text-muted: #94a3b8; --border-color: rgba(255,255,255,0.1); }
        .auth-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { background: white; padding: 2.5rem; border-radius: var(--radius); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        body.dark-mode .auth-card { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { color: var(--primary-color); font-weight: 800; font-size: 2rem; }
        .hidden-step { display: none; }
        .otp-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.5rem; margin: 1rem 0; }
        .otp-cell { text-align: center; font-size: 1.25rem; font-weight: 700; }
        .auth-divider { text-align: center; color: var(--text-muted); margin: 1rem 0; font-weight: 700; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 0.65rem; background: #fff; color: #111827; border: 1px solid #d1d5db; }
        .google-btn svg { width: 18px; height: 18px; }
    </style>
    <script>
        const savedTheme = localStorage.getItem('pdrs_theme');
        if (savedTheme === 'dark') document.documentElement.classList.add('dark-mode');
    </script>
</head>
<body class="animate-up">
    <nav class="navbar">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <h1 style="color: var(--primary-color); margin:0; display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-weight: 800;" onclick="window.location.href='/'">
                    <span style="font-size:1.5rem;">🛡️</span> PDRS
                </h1>
            </div>
            <div style="display:flex; align-items:center; gap:1.25rem;">
                <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn" title="Toggle Theme">🌙</button>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
        <div class="auth-header">
            <h1>PDRS Login</h1>
            <p class="text-muted">Welcome back! Please login.</p>
        </div>
        
        <div id="error-box" class="status-badge status-pending" style="display: none; width: 100%; margin-bottom: 1rem; text-transform: none; text-align: center;"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@university.edu" autofocus>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="password">Password</label>
                    <a href="#" id="forgot-password" class="text-muted" style="font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password" required placeholder="••••••••" style="padding-right: 2.5rem; width: 100%;">
                    <button type="button" onclick="ui.togglePassword('password', this)" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.25rem; padding: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">👁</button>
                </div>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="remember" style="width: auto; margin: 0;">
                <label for="remember" style="margin: 0; font-size: 0.9rem; cursor: pointer;">Remember me on this device</label>
            </div>
            <button type="submit" class="btn" id="login-btn">Login to Dashboard</button>
        </form>
        <div class="auth-divider">- or -</div>
        <button id="google-login-btn" class="btn google-btn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.8 3.2 14.6 2.2 12 2.2 6.6 2.2 2.2 6.6 2.2 12s4.4 9.8 9.8 9.8c5.6 0 9.3-4 9.3-9.6 0-.6-.1-1.1-.2-1.6H12z"/></svg>
            Continue with Google
        </button>

        <div id="otp-step" class="hidden-step">
            <p class="text-muted">Enter the 6-digit code sent to <span id="otp-email-mask"></span>.</p>
            <div id="otp-grid" class="otp-grid">
                <input class="otp-cell" maxlength="1" inputmode="numeric">
                <input class="otp-cell" maxlength="1" inputmode="numeric">
                <input class="otp-cell" maxlength="1" inputmode="numeric">
                <input class="otp-cell" maxlength="1" inputmode="numeric">
                <input class="otp-cell" maxlength="1" inputmode="numeric">
                <input class="otp-cell" maxlength="1" inputmode="numeric">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <button id="resend-otp-btn" class="btn btn-secondary" type="button">Resend OTP</button>
                <button type="button" class="btn btn-icon" style="width: 100%; font-size: 0.9rem;" onclick="showStep('login')">← Back to Login</button>
            </div>
            <p id="resend-otp-timer" class="text-muted" style="margin-top:0.5rem; text-align: center;"></p>
        </div>

        <div id="totp-step" class="hidden-step">
            <p class="text-muted">Enter code from your authenticator app.</p>
            <div class="form-group">
                <input type="text" id="totp-input" maxlength="6" placeholder="123456" inputmode="numeric">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <button id="totp-submit" class="btn" type="button">Verify Authenticator Code</button>
                <button id="use-email-otp" class="btn btn-secondary" type="button">Use email OTP instead</button>
                <button type="button" class="btn btn-icon" style="width: 100%; font-size: 0.9rem;" onclick="showStep('login')">← Back to Login</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p class="text-muted">Don't have an account? <a href="/register.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Register</a></p>
        </div>
    </div>
</div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        let pendingEmail = '';
        let resendInterval = null;

        // Initialize form validation
        ui.initFormValidation('login-form');

        // Add real-time validation for login fields
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        emailInput.addEventListener('input', () => ui.clearError(emailInput));
        passwordInput.addEventListener('input', () => ui.clearError(passwordInput));

        function showError(message) {
            const errorBox = document.getElementById('error-box');
            if (errorBox) {
                errorBox.textContent = message;
                errorBox.style.display = 'block';
            }
            showToast(message, 'error');
        }

        function showStep(step) {
            document.getElementById('login-form').style.display = step === 'login' ? 'block' : 'none';
            document.getElementById('otp-step').style.display = step === 'otp' ? 'block' : 'none';
            document.getElementById('totp-step').style.display = step === 'totp' ? 'block' : 'none';
            
            if (step === 'login') {
                // Reset OTP fields when going back
                otpInputs.forEach(i => i.value = '');
                if (resendInterval) {
                    clearInterval(resendInterval);
                    resendInterval = null;
                }
                document.getElementById('resend-otp-timer').textContent = '';
                document.getElementById('resend-otp-btn').disabled = false;
            }

            if (step === 'otp') {
                otpInputs[0].focus();
            }
            if (step === 'totp') {
                document.getElementById('totp-input').value = '';
                document.getElementById('totp-input').focus();
            }
        }

        function startResendTimer(seconds = 60) {
            const btn = document.getElementById('resend-otp-btn');
            const timer = document.getElementById('resend-otp-timer');
            let remaining = Math.max(0, Math.ceil(seconds));
            
            if (remaining <= 0) {
                btn.disabled = false;
                timer.textContent = '';
                return;
            }

            btn.disabled = true;
            if (resendInterval) clearInterval(resendInterval);
            
            timer.textContent = `Resend available in ${remaining}s`;
            
            resendInterval = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(resendInterval);
                    resendInterval = null;
                    btn.disabled = false;
                    timer.textContent = '';
                    return;
                }
                timer.textContent = `Resend available in ${remaining}s`;
            }, 1000);
        }



        document.getElementById('forgot-password').addEventListener('click', (e) => {
            e.preventDefault();
            showToast('Password reset functionality is coming soon! 🚧', 'info');
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('login-btn');
            const authCard = document.querySelector('.auth-card');
            
            ui.setLoading(loginBtn, true);

            try {
                const data = await apiFetch('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, remember })
                });

                pendingEmail = email;

                if (data.requiresOTP) {
                    document.getElementById('otp-email-mask').textContent = data.maskedEmail || data.email;
                    showStep('otp');
                    startResendTimer(data.secondsRemaining || 60);
                    return;
                }

                if (data.requiresTOTP) {
                    showStep('totp');
                    return;
                }

                auth.saveToken(data.token, data.user);
                auth.setDeviceId(data.deviceId);
                showToast('Login successful! ✅', 'success');
                
                const user = data?.user || data?.data?.user || data?.data;
                const role = user?.role;
                if (!role) { 
                    showError('Login failed. Please try again.'); 
                    return; 
                }

                const redirectMap = {
                    student: '/student.html',
                    faculty: '/faculty.html',
                    admin: '/admin.html'
                };
                
                setTimeout(() => {
                    window.location.href = redirectMap[role] || '/student.html';
                }, 500);

            } catch (err) {
                authCard.classList.add('shake');
                setTimeout(() => authCard.classList.remove('shake'), 500);
                showToast(err.message, 'error');
            } finally {
                ui.setLoading(loginBtn, false);
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', function() {
            ui.setLoading(this, true, '<svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.8 3.2 14.6 2.2 12 2.2 6.6 2.2 2.2 6.6 2.2 12s4.4 9.8 9.8 9.8c5.6 0 9.3-4 9.3-9.6 0-.6-.1-1.1-.2-1.6H12z"/></svg> Continue with Google');
            window.location.href = '/api/auth/google';
        });

        const otpInputs = Array.from(document.querySelectorAll('.otp-cell'));
        otpInputs.forEach((input, idx) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '');
                if (input.value && idx < otpInputs.length - 1) otpInputs[idx + 1].focus();
                const code = otpInputs.map(i => i.value).join('');
                if (code.length === 6) submitOTP(code);
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && idx > 0) otpInputs[idx - 1].focus();
            });
        });

        async function submitOTP(code) {
            const errorBox = document.getElementById('error-box');
            try {
                const data = await apiFetch('/api/auth/verify-otp', {
                    method: 'POST',
                    body: JSON.stringify({ email: pendingEmail, otp: code })
                });
                auth.saveToken(data.token, data.user);
                auth.setDeviceId(data.deviceId);
                
                const user = data?.user || data?.data?.user || data?.data;
                const role = user?.role;
                if (!role) { 
                    showError('Login failed. Please try again.'); 
                    return; 
                }

                const redirectMap = {
                    student: '/student.html',
                    faculty: '/faculty.html',
                    admin: '/admin.html'
                };
                window.location.href = redirectMap[role] || '/student.html';
            } catch (err) {
                document.getElementById('otp-grid').classList.add('shake');
                otpInputs.forEach(i => i.style.borderColor = '#dc2626');
                setTimeout(() => {
                    document.getElementById('otp-grid').classList.remove('shake');
                    otpInputs.forEach(i => i.style.borderColor = '');
                    otpInputs.forEach(i => i.value = '');
                    otpInputs[0].focus();
                }, 500);
                errorBox.textContent = err.message;
                errorBox.style.display = 'block';
            }
        }

        document.getElementById('resend-otp-btn').addEventListener('click', async function() {
            ui.setLoading(this, true);
            try {
                const data = await apiFetch('/api/auth/resend-otp', {
                    method: 'POST',
                    body: JSON.stringify({ email: pendingEmail })
                });
                startResendTimer(data.secondsRemaining || 60);
                showToast('OTP resent ✅', 'success');
            } catch (err) {
                // If 429, the error message from apiFetch/toast might already be enough, 
                // but we might want to check for secondsRemaining if we want to restart timer.
                // However apiFetch doesn't return the raw response for 429.
                // Let's stick to simple for now.
            } finally {
                ui.setLoading(this, false, 'Resend OTP');
            }
        });

        document.getElementById('totp-submit').addEventListener('click', async function() {
            const token = document.getElementById('totp-input').value.trim();
            if (!token) {
                ui.showError(document.getElementById('totp-input'), 'Please enter the code');
                return;
            }
            ui.setLoading(this, true);
            try {
                const data = await apiFetch('/api/auth/verify-totp', {
                    method: 'POST',
                    body: JSON.stringify({ email: pendingEmail, token })
                });
                auth.saveToken(data.token, data.user);
                auth.setDeviceId(data.deviceId);
                
                const user = data?.user || data?.data?.user || data?.data;
                const role = user?.role;
                if (!role) { 
                    showError('Login failed. Please try again.'); 
                    return; 
                }

                const redirectMap = {
                    student: '/student.html',
                    faculty: '/faculty.html',
                    admin: '/admin.html'
                };
                window.location.href = redirectMap[role] || '/student.html';
            } catch (err) {
                document.getElementById('error-box').textContent = err.message || 'Invalid authenticator code';
                document.getElementById('error-box').style.display = 'block';
            } finally {
                ui.setLoading(this, false);
            }
        });

        document.getElementById('use-email-otp').addEventListener('click', async () => {
            try {
                const data = await apiFetch('/api/auth/resend-otp', {
                    method: 'POST',
                    body: JSON.stringify({ email: pendingEmail })
                });
                document.getElementById('otp-email-mask').textContent = data.maskedEmail || pendingEmail;
                showStep('otp');
                startResendTimer(data.secondsRemaining || 60);
            } catch (err) {
                // Error handled by apiFetch
            }
        });

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('pdrs_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
        }
        
        if (localStorage.getItem('pdrs_theme') === 'dark') {
            document.getElementById('theme-btn').textContent = '☀️';
        }

        (async function handleGoogleRedirect() {
            const hash = window.location.hash || '';
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            const errorBox = document.getElementById('error-box');
            if (error === 'google-failed') {
                errorBox.textContent = 'Google sign-in failed. Please try again.';
                errorBox.style.display = 'block';
            }

            if (!hash.startsWith('#token=')) return;
            const token = decodeURIComponent(hash.replace('#token=', ''));
            try {
                // apiFetch automatically handles Authorization header if we pass it, 
                // but here we have a raw token from redirect.
                const meData = await apiFetch('/api/auth/me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                // meData IS the user object since apiFetch unwraps it
                const user = meData?.user || meData?.data?.user || meData?.data || meData;
                const role = user?.role;
                if (!role) { 
                    showError('Login failed. Please try again.'); 
                    return; 
                }
                auth.saveToken(token, user);
                history.replaceState(null, '', window.location.pathname);
                
                const redirectMap = {
                    student: '/student.html',
                    faculty: '/faculty.html',
                    admin: '/admin.html'
                };
                window.location.href = redirectMap[role] || '/student.html';
            } catch (err) {
                errorBox.textContent = 'Google sign-in failed. Please login again.';
                errorBox.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
