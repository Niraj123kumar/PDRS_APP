<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defense History - PDRS</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body.dark-mode { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9; --text-muted: #94a3b8; --border-color: rgba(255,255,255,0.1); }
        .history-container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .chart-card { background: white; padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 2rem; height: 300px; }
        body.dark-mode .chart-card { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); }
        
        .session-row { background: white; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 0.75rem; overflow: hidden; }
        body.dark-mode .session-row { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); }
        .session-header { padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .session-header:hover { background: #f8fafc; }
        body.dark-mode .session-header:hover { background: rgba(255,255,255,0.05); }
        
        .session-details { display: none; padding: 1.5rem; border-top: 1px solid var(--border-color); background: #fdfdfd; }
        body.dark-mode .session-details { background: rgba(0,0,0,0.1); }
        .qa-item { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px dashed var(--border-color); }
        .qa-item:last-child { border-bottom: none; }
        
        .score-pills { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .score-pill { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: #f1f5f9; color: var(--text-muted); }
        body.dark-mode .score-pill { background: rgba(255,255,255,0.1); color: var(--text-muted); }
        
        .empty-state { text-align: center; padding: 4rem; background: white; border-radius: var(--radius); box-shadow: var(--shadow); }
        body.dark-mode .empty-state { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); }
        .theme-toggle { cursor: pointer; font-size: 1.25rem; background: none; border: none; padding: 0.5rem; }
        .history-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .history-tabs button { padding: 0.65rem 1.25rem; border-radius: var(--radius); border: 1px solid #e2e8f0; background: white; cursor: pointer; font-weight: 600; }
        body.dark-mode .history-tabs button { background: var(--card-bg); color: var(--text-color); border-color: var(--border-color); }
        .history-tabs button.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .template-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        body.dark-mode .template-card { background: var(--card-bg); border: 1px solid var(--border-color); }
    </style>
    <script>
        const savedTheme = localStorage.getItem('pdrs_theme');
        if (savedTheme === 'dark') document.documentElement.classList.add('dark-mode');
    </script>
</head>
<body class="animate-up">
    <nav class="navbar">
        <h1 style="color: var(--primary-color); font-weight: 800; cursor: pointer;" onclick="window.location.href='/'">Defense History</h1>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <button onclick="toggleTheme()" class="theme-toggle">🌙</button>
            <button onclick="window.location.href='/student.html'" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">Dashboard</button>
        </div>
    </nav>

    <div class="history-container">
        <div class="history-tabs" role="tablist">
            <button type="button" class="active" data-history-tab="sessions" role="tab" aria-selected="true">Sessions</button>
            <button type="button" data-history-tab="templates" role="tab" aria-selected="false">Your templates</button>
        </div>

        <div id="history-panel-sessions">
        <div style="margin-bottom:1.5rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: space-between;">
            <div style="display: flex; gap: 0.5rem; flex: 1; min-width: 300px;">
                <input type="text" id="session-search" placeholder="Search project title..." style="flex: 1; padding: 0.5rem; border-radius: var(--radius); border: 1px solid var(--border-color);">
                <select id="status-filter" style="padding: 0.5rem; border-radius: var(--radius); border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);">
                    <option value="all">All Status</option>
                    <option value="completed">Completed</option>
                    <option value="in_progress">In Progress</option>
                </select>
                <select id="sort-filter" style="padding: 0.5rem; border-radius: var(--radius); border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);">
                    <option value="date-desc">Newest First</option>
                    <option value="date-asc">Oldest First</option>
                    <option value="score-desc">Highest Score</option>
                    <option value="score-asc">Lowest Score</option>
                </select>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button id="export-progress-btn" class="btn" style="width:auto; padding: 0.5rem 1rem;">Export Report</button>
            </div>
        </div>
        <div class="chart-card">
            <canvas id="trendChart"></canvas>
        </div>

        <div id="loading-history" style="display: none;"></div>

        <div id="session-list" style="display: none;"></div>

        <div id="pagination-container" style="display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem;"></div>

        <div id="empty-history" style="display: none;"></div>
        </div>

        <div id="history-panel-templates" style="display: none;">
            <p class="text-muted" style="margin-bottom:1rem; font-size:0.95rem;">Saved question sets for quick rehearsals. Using a template skips AI question generation.</p>
            <div id="loading-templates" style="display: none;"></div>
            <div id="templates-list"></div>
            <div id="empty-templates" style="display: none;"></div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('pdrs_theme', isDark ? 'dark' : 'light');
            document.querySelectorAll('.theme-toggle').forEach(btn => {
                btn.textContent = isDark ? '☀️' : '🌙';
            });
        }
        
        if (localStorage.getItem('pdrs_theme') === 'dark') {
            document.querySelectorAll('.theme-toggle').forEach(btn => btn.textContent = '☀️');
        }
    </script>
    <script src="/js/history-logic.js"></script>
</body>
</html>
