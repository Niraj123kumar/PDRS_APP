<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare students - PDRS</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
        @media (max-width: 800px) { 
            .cmp-grid { grid-template-columns: 1fr; } 
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid var(--border-color); margin-bottom: 0.5rem; border-radius: 8px; padding: 0.5rem; background: var(--card-bg); }
            td { border: none; position: relative; padding-left: 50% !important; text-align: right !important; min-height: 2.5rem; display: flex; align-items: center; justify-content: flex-end; }
            td:before { content: attr(data-label); position: absolute; left: 1rem; width: 45%; padding-right: 10px; white-space: nowrap; text-align: left; font-weight: 700; color: var(--text-muted); }
        }
        .card-cmp { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.25rem; box-shadow: var(--shadow); }
        select:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Table Styles */
        .table-section { width: 100%; border-collapse: collapse; margin-top: 1rem; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        .table-section th { background: var(--hover-bg); padding: 1rem; text-align: left; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border-color); }
        .table-section td { padding: 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        .table-section tr:last-child td { border-bottom: none; }
        
        /* Zebra Striping & Hover */
        .table-section tbody tr:nth-child(even) { background: rgba(0,0,0,0.02); }
        .dark-mode .table-section tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        .table-section tbody tr:hover { background: var(--hover-bg) !important; transition: background 0.2s; }

        /* Form Controls */
        select { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background: var(--bg-color); 
            color: var(--text-color);
            font-size: 1rem;
            min-height: 44px;
        }
        select:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 2px var(--primary-glow); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <h1 style="color: var(--primary-color); margin:0; display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-weight: 800;" onclick="window.location.href='/'">
                    <span style="font-size:1.5rem;">🛡️</span> PDRS
                </h1>
                <div style="display: flex; gap: 1.5rem;">
                    <a href="/faculty.html" class="nav-link">Dashboard</a>
                    <a href="/compare.html" class="nav-link active">Compare</a>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div id="user-nav-info" style="display: flex; align-items: center; gap: 1rem;">
                    <div id="user-avatar" class="avatar-initials" style="width: 30px; height: 30px; font-size: 0.8rem;"></div>
                    <span id="nav-role-badge" class="role-badge">Faculty</span>
                    <button onclick="auth.logout()" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
                </div>
                <button onclick="toggleTheme()" class="theme-toggle" id="theme-btn" title="Toggle Theme">🌙</button>
            </div>
        </div>
    </nav>
    <div class="container" style="max-width: 1100px; margin: 0 auto; padding: 1rem;">
        <h2 style="font-weight: 800; color: var(--primary-color); margin-bottom: 1.5rem;">Compare Students</h2>
        <div id="compare-filters" style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; margin-bottom: 2rem; background: var(--card-bg); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border-color); box-shadow: var(--shadow);">
            <div style="flex: 1; min-width: 220px;">
                <label for="sel-a" style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block;">Student A</label>
                <select id="sel-a" required></select>
            </div>
            <div style="flex: 1; min-width: 220px;">
                <label for="sel-b" style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; display: block;">Student B</label>
                <select id="sel-b" required></select>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button type="button" class="btn" id="btn-compare" style="width: auto; padding: 0.75rem 2rem;">Compare Now</button>
                <button type="button" class="btn btn-secondary" id="btn-export" style="width: auto; padding: 0.75rem 1rem; display: none;">📄 Export PDF</button>
            </div>
        </div>

        <div id="loading-state" style="display: none;"></div>

        <p id="cmp-summary" class="insight" style="margin-top:1rem; padding:1rem; background: var(--primary-glow); border: 1px solid var(--primary-color); border-radius:12px; display:none; color: var(--text-color);"></p>
        <div class="cmp-grid" id="main-cmp" style="display:none;">
            <div class="card-cmp">
                <h3 id="n-a">A</h3>
                <canvas id="radar-a" height="220"></canvas>
                <p id="stat-a" class="text-muted"></p>
                <canvas id="spark-a" height="100"></canvas>
            </div>
            <div class="card-cmp">
                <h3 id="n-b">B</h3>
                <canvas id="radar-b" height="220"></canvas>
                <p id="stat-b" class="text-muted"></p>
                <canvas id="spark-b" height="100"></canvas>
            </div>
        </div>
        <h3 id="h2h-h" style="display:none; margin-top:1.5rem">Head to head (dimensions, 0–100)</h3>
        <table id="h2h" style="display:none; max-width: 600px;" class="table-section"></table>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        auth.requireAuth();
        auth.requireRole('faculty');
        let rA, rB, sA, sB;
        const dims = ['clarity', 'reasoning', 'depth', 'confidence'];
        const params = new URLSearchParams(window.location.search);
        
        // Initialize Validation
        ui.initFormValidation('compare-filters');

        async function loadStudents() {
            const a = document.getElementById('sel-a');
            const b = document.getElementById('sel-b');
            const btn = document.getElementById('btn-compare');
            
            // Show skeleton for selects
            a.innerHTML = b.innerHTML = '<option value="">Loading students...</option>';
            a.disabled = b.disabled = true;
            ui.setLoading(btn, true);

            try {
                const res = await fetch('/api/faculty/students', { headers: auth.getHeaders() });
                if (!res.ok) throw new Error('Failed to load students');
                const st = await res.json();
                
                if (st.length === 0) {
                    a.innerHTML = b.innerHTML = '<option value="">No students found</option>';
                    ui.showEmptyState('main-cmp', '👥', 'No Students Found', 'You need at least two students to perform a comparison.', 'Go to Dashboard', '/faculty.html');
                    document.getElementById('main-cmp').style.display = 'block';
                    return;
                }

                a.innerHTML = b.innerHTML = '<option value="">-- Select Student --</option>' + st.map(s => `<option value="${s.id}">${s.name} (${s.email})</option>`).join('');
                if (params.get('a')) a.value = params.get('a');
                if (params.get('b')) b.value = params.get('b');
                
                a.disabled = b.disabled = false;
            } catch (err) {
                showToast(err.message, 'error');
                a.innerHTML = b.innerHTML = '<option value="">Error loading students</option>';
            } finally {
                ui.setLoading(btn, false);
            }
        }

        // Initialize Initials Avatar
        document.addEventListener('DOMContentLoaded', () => {
            const user = auth.getUser();
            if (user && user.name) {
                const avatar = document.getElementById('user-avatar');
                if (avatar) {
                    const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    avatar.textContent = initials;
                    avatar.style.background = `hsl(${user.name.length * 137.5 % 360}, 70%, 50%)`;
                }
            }
        });

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('pdrs_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
        }

        if (localStorage.getItem('pdrs_theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.getElementById('theme-btn').textContent = '☀️';
        }

        function bestWorst(d) {
            const e = Object.entries(d);
            if (e.length === 0) return { best: ['-', 0], worst: ['-', 0] };
            e.sort((x,y) => y[1]-x[1]);
            return { best: e[0], worst: e[e.length-1] };
        }

        async function run() {
            const btn = document.getElementById('btn-compare');
            const exportBtn = document.getElementById('btn-export');
            const ida = document.getElementById('sel-a').value;
            const idb = document.getElementById('sel-b').value;
            
            if (!ida || !idb) {
                showToast('Please select two students to compare', 'warning');
                return;
            }
            if (ida === idb) {
                showToast('Please pick two different students', 'warning');
                return;
            }

            ui.setLoading(btn, true);
            exportBtn.style.display = 'none';
            document.getElementById('main-cmp').style.display = 'none';
            document.getElementById('cmp-summary').style.display = 'none';
            document.getElementById('h2h-h').style.display = 'none';
            document.getElementById('h2h').style.display = 'none';
            
            const loader = document.getElementById('loading-state');
            loader.style.display = 'block';
            ui.showSkeleton('loading-state', 2, 'card');

            try {
                const res = await fetch('/api/faculty/compare/' + ida + '/' + idb, { 
                    headers: auth.getHeaders() 
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'Comparison failed');

                const A = d.studentA, B = d.studentB;
                document.getElementById('n-a').textContent = A.name;
                document.getElementById('n-b').textContent = B.name;
                
                const wa = bestWorst(A.dimensions), wb = bestWorst(B.dimensions);
                document.getElementById('stat-a').innerHTML = `<strong>Best:</strong> ${wa.best[0]} (${Math.round(wa.best[1])}) <br> <strong>Worst:</strong> ${wa.worst[0]} (${Math.round(wa.worst[1])})`;
                document.getElementById('stat-b').innerHTML = `<strong>Best:</strong> ${wb.best[0]} (${Math.round(wb.best[1])}) <br> <strong>Worst:</strong> ${wb.worst[0]} (${Math.round(wb.worst[1])})`;
                
                // Chart colors based on theme
                const isDark = document.body.classList.contains('dark-mode');
                const textColor = isDark ? '#94a3b8' : '#64748b';
                const gridColor = isDark ? '#334155' : '#e2e8f0';

                const chartOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: gridColor },
                            angleLines: { color: gridColor },
                            pointLabels: { color: textColor, font: { size: window.innerWidth < 600 ? 10 : 12 } }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: textColor, font: { size: window.innerWidth < 600 ? 10 : 12 } } }
                    }
                };

                if (rA) rA.destroy();
                if (rB) rB.destroy();
                
                try {
                    rA = new Chart(document.getElementById('radar-a').getContext('2d'), {
                        type: 'radar',
                        data: { 
                            labels: dims, 
                            datasets: [{ 
                                label: A.name, 
                                data: dims.map(x => A.dimensions[x] || 0), 
                                borderColor: '#2563eb',
                                backgroundColor: 'rgba(37, 99, 235, 0.2)'
                            }] 
                        },
                        options: chartOptions
                    });

                    rB = new Chart(document.getElementById('radar-b').getContext('2d'), {
                        type: 'radar',
                        data: { 
                            labels: dims, 
                            datasets: [{ 
                                label: B.name, 
                                data: dims.map(x => B.dimensions[x] || 0), 
                                borderColor: '#16a34a',
                                backgroundColor: 'rgba(22, 163, 74, 0.2)'
                            }] 
                        },
                        options: chartOptions
                    });
                } catch (chartErr) {
                    console.error('Chart.js initialization failed:', chartErr);
                    showToast('Failed to initialize performance charts', 'error');
                }

                const sa = (A.sessions || []).map(s => s.overall_score).filter(x => x != null).reverse();
                const sb = (B.sessions || []).map(s => s.overall_score).filter(x => x != null).reverse();
                
                const sparkOptions = {
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false, min: 0, max: 100 }
                    }
                };

                if (sA) sA.destroy();
                if (sB) sB.destroy();
                
                sA = new Chart(document.getElementById('spark-a').getContext('2d'), { 
                    type: 'line', 
                    data: { labels: sa.map((_,i) => 'S'+(i+1)), datasets: [{ data: sa, borderColor: '#2563eb', tension: 0.3, pointRadius: 0 }] }, 
                    options: sparkOptions 
                });
                sB = new Chart(document.getElementById('spark-b').getContext('2d'), { 
                    type: 'line', 
                    data: { labels: sb.map((_,i) => 'S'+(i+1)), datasets: [{ data: sb, borderColor: '#16a34a', tension: 0.3, pointRadius: 0 }] }, 
                    options: sparkOptions 
                });

                const c = d.comparison;
                document.getElementById('cmp-summary').style.display = 'block';
                document.getElementById('cmp-summary').innerHTML = `
                    <div style="display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center;">
                        <span><strong>🏆 Overall leader:</strong> ${c.winner.overall}</span>
                        <span><strong>🎯 Closest dim:</strong> ${c.closestDimension}</span>
                        <span><strong>📈 Biggest gap:</strong> ${c.biggestGap.dimension} (${c.biggestGap.gap})</span>
                    </div>
                `;

                const tb = document.getElementById('h2h');
                tb.innerHTML = `
                    <thead>
                        <tr>
                            <th>Dimension</th>
                            <th>${A.name}</th>
                            <th>${B.name}</th>
                            <th>Lead</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${dims.map(dim => {
                            const va = Math.round(A.dimensions[dim]||0), vb = Math.round(B.dimensions[dim]||0);
                            const w = c.winner[dim] || 'tie';
                            const leadColor = w === A.name ? '#2563eb' : (w === B.name ? '#16a34a' : 'inherit');
                            return `
                                <tr>
                                    <td data-label="Dimension">${dim.charAt(0).toUpperCase() + dim.slice(1)}</td>
                                    <td data-label="${A.name}">${va}</td>
                                    <td data-label="${B.name}">${vb}</td>
                                    <td data-label="Lead" style="font-weight: bold; color: ${leadColor}">${w}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                `;
                
                document.getElementById('h2h-h').style.display = 'block';
                tb.style.display = 'table';
                document.getElementById('main-cmp').style.display = 'grid';
                exportBtn.style.display = 'block';
                showToast('Comparison loaded! 📊', 'success');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                ui.setLoading(btn, false);
                loader.style.display = 'none';
            }
        }

        async function exportToPDF() {
            const btn = document.getElementById('btn-export');
            const nameA = document.getElementById('n-a').textContent;
            const nameB = document.getElementById('n-b').textContent;
            
            ui.setLoading(btn, true, 'Generating...');
            
            // Create a clone of the report area for PDF generation
            const element = document.createElement('div');
            element.style.padding = '20px';
            element.style.background = 'white';
            element.style.color = 'black';
            
            element.innerHTML = `
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h1 style="color: #2563eb; margin-bottom: 0.5rem;">PDRS Student Comparison Report</h1>
                    <p style="color: #64748b;">Generated on ${new Date().toLocaleDateString()}</p>
                </div>
                
                <div style="background: #f8fafc; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 2rem;">
                    <div style="display: flex; justify-content: space-around; font-weight: bold;">
                        <span>Student A: ${nameA}</span>
                        <span>Student B: ${nameB}</span>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    ${document.getElementById('cmp-summary').outerHTML}
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 2rem;">
                    <div style="flex: 1; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px;">
                        <h3 style="text-align: center;">${nameA}</h3>
                        <img src="${document.getElementById('radar-a').toDataURL()}" style="width: 100%;" />
                        <div style="margin-top: 10px; font-size: 0.9rem;">
                            ${document.getElementById('stat-a').innerHTML}
                        </div>
                    </div>
                    <div style="flex: 1; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px;">
                        <h3 style="text-align: center;">${nameB}</h3>
                        <img src="${document.getElementById('radar-b').toDataURL()}" style="width: 100%;" />
                        <div style="margin-top: 10px; font-size: 0.9rem;">
                            ${document.getElementById('stat-b').innerHTML}
                        </div>
                    </div>
                </div>

                <div>
                    <h3 style="margin-bottom: 10px;">Head to Head Comparison</h3>
                    ${document.getElementById('h2h').outerHTML}
                </div>
                
                <style>
                    .table-section { width: 100%; border-collapse: collapse; margin-top: 1rem; border: 1px solid #e2e8f0; }
                    .table-section th { background: #f1f5f9; padding: 10px; text-align: left; border-bottom: 2px solid #e2e8f0; }
                    .table-section td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
                    .insight { padding: 15px; background: #eff6ff; border: 1px solid #2563eb; border-radius: 12px; }
                </style>
            `;

            document.body.appendChild(element);
            
            const opt = {
                margin: 10,
                filename: `PDRS_Comparison_${nameA}_vs_${nameB}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                await html2pdf().set(opt).from(element).save();
                showToast('Report downloaded! 📄', 'success');
            } catch (err) {
                console.error(err);
                showToast('Failed to generate PDF', 'error');
            } finally {
                document.body.removeChild(element);
                ui.setLoading(btn, false, '📄 Export PDF');
            }
        }

        document.getElementById('btn-compare').onclick = run;
        document.getElementById('btn-export').onclick = exportToPDF;
        loadStudents().then(() => { if (params.get('a') && params.get('b')) run(); });
    </script>
</body>
</html>
