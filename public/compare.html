<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare students - PDRS</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
        @media (max-width: 800px) { 
            .cmp-grid { grid-template-columns: 1fr; } 
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid var(--border-color); margin-bottom: 0.5rem; border-radius: 8px; padding: 0.5rem; background: var(--card-bg); }
            td { border: none; position: relative; padding-left: 50% !important; text-align: right !important; min-height: 2.5rem; display: flex; align-items: center; justify-content: flex-end; }
            td:before { content: attr(data-label); position: absolute; left: 1rem; width: 45%; padding-right: 10px; white-space: nowrap; text-align: left; font-weight: 700; color: var(--text-muted); }
        }
        .card-cmp { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.25rem; box-shadow: var(--shadow); }
        select:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/faculty.html" style="font-weight: 800; color: var(--primary-color);">← Faculty</a>
    </nav>
    <div class="container" style="max-width: 1100px; margin: 0 auto; padding: 1rem;">
        <h1>Compare students</h1>
        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: end; margin-bottom: 1.5rem;">
            <div><label>Student A</label><br>
                <select id="sel-a" style="min-width: 220px; padding: 0.4rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);"></select></div>
            <div><label>Student B</label><br>
                <select id="sel-b" style="min-width: 220px; padding: 0.4rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color);"></select></div>
            <button type="button" class="btn" id="btn-compare" style="width: auto;">Compare</button>
        </div>

        <div id="loading-state" style="display: none;"></div>

        <p id="cmp-summary" class="insight" style="margin-top:1rem; padding:1rem; background: var(--primary-glow); border: 1px solid var(--primary-color); border-radius:12px; display:none; color: var(--text-color);"></p>
        <div class="cmp-grid" id="main-cmp" style="display:none;">
            <div class="card-cmp">
                <h3 id="n-a">A</h3>
                <canvas id="radar-a" height="220"></canvas>
                <p id="stat-a" class="text-muted"></p>
                <canvas id="spark-a" height="100"></canvas>
            </div>
            <div class="card-cmp">
                <h3 id="n-b">B</h3>
                <canvas id="radar-b" height="220"></canvas>
                <p id="stat-b" class="text-muted"></p>
                <canvas id="spark-b" height="100"></canvas>
            </div>
        </div>
        <h3 id="h2h-h" style="display:none; margin-top:1.5rem">Head to head (dimensions, 0–100)</h3>
        <table id="h2h" style="display:none; max-width: 600px;" class="table-section"></table>
    </div>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        auth.requireAuth();
        auth.requireRole('faculty');
        const t = auth.getToken();
        let rA, rB, sA, sB;
        const dims = ['clarity', 'reasoning', 'depth', 'confidence'];
        const params = new URLSearchParams(window.location.search);
        
        async function loadStudents() {
            const a = document.getElementById('sel-a');
            const b = document.getElementById('sel-b');
            const btn = document.getElementById('btn-compare');
            
            // Show skeleton for selects
            a.innerHTML = b.innerHTML = '<option value="">Loading students...</option>';
            a.disabled = b.disabled = true;
            btn.disabled = true;

            try {
                const res = await fetch('/api/faculty/students', { headers: { 'Authorization': `Bearer ${t}` } });
                if (!res.ok) throw new Error('Failed to load students');
                const st = await res.json();
                
                if (st.length === 0) {
                    a.innerHTML = b.innerHTML = '<option value="">No students found</option>';
                    ui.showEmptyState('main-cmp', '👥', 'No Students Found', 'You need at least two students to perform a comparison.', 'Go to Dashboard', '/faculty.html');
                    document.getElementById('main-cmp').style.display = 'block';
                    return;
                }

                a.innerHTML = b.innerHTML = '<option value="">-- Select Student --</option>' + st.map(s => `<option value="${s.id}">${s.name} (${s.email})</option>`).join('');
                if (params.get('a')) a.value = params.get('a');
                if (params.get('b')) b.value = params.get('b');
                
                a.disabled = b.disabled = false;
                btn.disabled = false;
            } catch (err) {
                showToast(err.message, 'error');
                a.innerHTML = b.innerHTML = '<option value="">Error loading students</option>';
            }
        }

        function bestWorst(d) {
            const e = Object.entries(d);
            if (e.length === 0) return { best: ['-', 0], worst: ['-', 0] };
            e.sort((x,y) => y[1]-x[1]);
            return { best: e[0], worst: e[e.length-1] };
        }

        async function run() {
            const btn = document.getElementById('btn-compare');
            const ida = document.getElementById('sel-a').value;
            const idb = document.getElementById('sel-b').value;
            
            if (!ida || !idb) {
                showToast('Please select two students to compare', 'warning');
                return;
            }
            if (ida === idb) {
                showToast('Please pick two different students', 'warning');
                return;
            }

            ui.setLoading(btn, true);
            document.getElementById('main-cmp').style.display = 'none';
            document.getElementById('cmp-summary').style.display = 'none';
            document.getElementById('h2h-h').style.display = 'none';
            document.getElementById('h2h').style.display = 'none';
            
            const loader = document.getElementById('loading-state');
            loader.style.display = 'block';
            ui.showSkeleton('loading-state', 2, 'card');

            try {
                const res = await fetch('/api/faculty/compare/' + ida + '/' + idb, { 
                    headers: { 'Authorization': `Bearer ${t}` } 
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'Comparison failed');

                const A = d.studentA, B = d.studentB;
                document.getElementById('n-a').textContent = A.name;
                document.getElementById('n-b').textContent = B.name;
                
                const wa = bestWorst(A.dimensions), wb = bestWorst(B.dimensions);
                document.getElementById('stat-a').innerHTML = `<strong>Best:</strong> ${wa.best[0]} (${Math.round(wa.best[1])}) <br> <strong>Worst:</strong> ${wa.worst[0]} (${Math.round(wa.worst[1])})`;
                document.getElementById('stat-b').innerHTML = `<strong>Best:</strong> ${wb.best[0]} (${Math.round(wb.best[1])}) <br> <strong>Worst:</strong> ${wb.worst[0]} (${Math.round(wb.worst[1])})`;
                
                // Chart colors based on theme
                const isDark = document.body.classList.contains('dark-mode');
                const textColor = isDark ? '#94a3b8' : '#64748b';
                const gridColor = isDark ? '#334155' : '#e2e8f0';

                const chartOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: gridColor },
                            angleLines: { color: gridColor },
                            pointLabels: { color: textColor }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: textColor } }
                    }
                };

                if (rA) rA.destroy();
                if (rB) rB.destroy();
                
                rA = new Chart(document.getElementById('radar-a').getContext('2d'), {
                    type: 'radar',
                    data: { 
                        labels: dims, 
                        datasets: [{ 
                            label: A.name, 
                            data: dims.map(x => A.dimensions[x] || 0), 
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.2)'
                        }] 
                    },
                    options: chartOptions
                });

                rB = new Chart(document.getElementById('radar-b').getContext('2d'), {
                    type: 'radar',
                    data: { 
                        labels: dims, 
                        datasets: [{ 
                            label: B.name, 
                            data: dims.map(x => B.dimensions[x] || 0), 
                            borderColor: '#16a34a',
                            backgroundColor: 'rgba(22, 163, 74, 0.2)'
                        }] 
                    },
                    options: chartOptions
                });

                const sa = (A.sessions || []).map(s => s.overall_score).filter(x => x != null).reverse();
                const sb = (B.sessions || []).map(s => s.overall_score).filter(x => x != null).reverse();
                
                const sparkOptions = {
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false, min: 0, max: 100 }
                    }
                };

                if (sA) sA.destroy();
                if (sB) sB.destroy();
                
                sA = new Chart(document.getElementById('spark-a').getContext('2d'), { 
                    type: 'line', 
                    data: { labels: sa.map((_,i) => 'S'+(i+1)), datasets: [{ data: sa, borderColor: '#2563eb', tension: 0.3, pointRadius: 0 }] }, 
                    options: sparkOptions 
                });
                sB = new Chart(document.getElementById('spark-b').getContext('2d'), { 
                    type: 'line', 
                    data: { labels: sb.map((_,i) => 'S'+(i+1)), datasets: [{ data: sb, borderColor: '#16a34a', tension: 0.3, pointRadius: 0 }] }, 
                    options: sparkOptions 
                });

                const c = d.comparison;
                document.getElementById('cmp-summary').style.display = 'block';
                document.getElementById('cmp-summary').innerHTML = `
                    <div style="display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center;">
                        <span><strong>🏆 Overall leader:</strong> ${c.winner.overall}</span>
                        <span><strong>🎯 Closest dim:</strong> ${c.closestDimension}</span>
                        <span><strong>📈 Biggest gap:</strong> ${c.biggestGap.dimension} (${c.biggestGap.gap})</span>
                    </div>
                `;

                const tb = document.getElementById('h2h');
                tb.innerHTML = `
                    <thead>
                        <tr>
                            <th>Dimension</th>
                            <th>${A.name}</th>
                            <th>${B.name}</th>
                            <th>Lead</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${dims.map(dim => {
                            const va = Math.round(A.dimensions[dim]||0), vb = Math.round(B.dimensions[dim]||0);
                            const w = c.winner[dim] || 'tie';
                            const leadColor = w === A.name ? '#2563eb' : (w === B.name ? '#16a34a' : 'inherit');
                            return `
                                <tr>
                                    <td data-label="Dimension">${dim.charAt(0).toUpperCase() + dim.slice(1)}</td>
                                    <td data-label="${A.name}">${va}</td>
                                    <td data-label="${B.name}">${vb}</td>
                                    <td data-label="Lead" style="font-weight: bold; color: ${leadColor}">${w}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                `;
                
                document.getElementById('h2h-h').style.display = 'block';
                tb.style.display = 'table';
                document.getElementById('main-cmp').style.display = 'grid';
                showToast('Comparison loaded! 📊', 'success');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                ui.setLoading(btn, false);
                loader.style.display = 'none';
            }
        }
        document.getElementById('btn-compare').onclick = run;
        loadStudents().then(() => { if (params.get('a') && params.get('b')) run(); });
    </script>
</body>
</html>
