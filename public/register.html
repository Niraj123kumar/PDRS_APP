<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PDRS</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f1f5f9; --text-muted: #94a3b8; --border-color: rgba(255,255,255,0.1); }
        .auth-card { background: white; padding: 2.5rem; border-radius: var(--radius); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        body.dark-mode .auth-card { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); }
        .role-toggle { display: flex; gap: 1rem; margin-bottom: 1.5rem; background: #f1f5f9; padding: 0.4rem; border-radius: 10px; }
        body.dark-mode .role-toggle { background: rgba(255,255,255,0.05); }
        .role-option { flex: 1; text-align: center; }
        .role-option input { display: none; }
        .role-label { display: block; padding: 0.6rem; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-muted); transition: all 0.2s; }
        .role-option input:checked + .role-label { background: white; color: var(--primary-color); box-shadow: var(--shadow); }
        body.dark-mode .role-option input:checked + .role-label { background: #334155; color: white; }
        .strength-meter { height: 4px; background: #e2e8f0; margin-top: 0.5rem; border-radius: 2px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0; transition: all 0.3s; }
        .strength-weak { background: var(--error-color); width: 33.33%; }
        .strength-medium { background: var(--warning-color); width: 66.66%; }
        .strength-strong { background: var(--success-color); width: 100%; }
        .theme-toggle-fixed { position: fixed; bottom: 2rem; right: 2rem; background: var(--card-bg, white); box-shadow: var(--shadow); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; z-index: 1000; border: 1px solid var(--border-color, #e2e8f0); cursor: pointer; font-size: 1.25rem; }
        .auth-divider { text-align: center; color: var(--text-muted); margin: 1rem 0; font-weight: 700; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 0.65rem; background: #fff; color: #111827; border: 1px solid #d1d5db; }
        .google-btn svg { width: 18px; height: 18px; }
    </style>
    <script>
        const savedTheme = localStorage.getItem('pdrs_theme');
        if (savedTheme === 'dark') document.documentElement.classList.add('dark-mode');
    </script>
</head>
<body class="animate-up">
    <button onclick="toggleTheme()" class="theme-toggle-fixed" id="theme-btn">🌙</button>
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="color: var(--primary-color); font-weight: 800; font-size: 2rem;">Create Account</h1>
            <p class="text-muted">Join the rehearsal system today.</p>
        </div>

        <div id="error-box" class="status-badge status-pending" style="display: none; width: 100%; margin-bottom: 1rem; text-transform: none; text-align: center;"></div>

        <form id="register-form">
            <div class="role-toggle">
                <div class="role-option">
                    <input type="radio" name="role" id="role-student" value="student" checked>
                    <label for="role-student" class="role-label">Student</label>
                </div>
                <div class="role-option">
                    <input type="radio" name="role" id="role-faculty" value="faculty">
                    <label for="role-faculty" class="role-label">Faculty</label>
                </div>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe" autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@university.edu">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" required placeholder="••••••••" minlength="6" style="padding-right: 2.5rem; width: 100%;">
                    <button type="button" id="toggle-password" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.25rem; padding: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">👁</button>
                </div>
                <div class="strength-meter">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
                <p id="strength-text" style="font-size: 0.75rem; margin-top: 0.25rem; color: var(--text-muted);">Password strength</p>
            </div>
            <button type="submit" class="btn" id="register-btn">Register Account</button>
        </form>
        <div class="auth-divider">- or -</div>
        <button id="google-register-btn" class="btn google-btn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.8 3.2 14.6 2.2 12 2.2 6.6 2.2 2.2 6.6 2.2 12s4.4 9.8 9.8 9.8c5.6 0 9.3-4 9.3-9.6 0-.6-.1-1.1-.2-1.6H12z"/></svg>
            Sign up with Google
        </button>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p class="text-muted">Already have an account? <a href="/login.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Login</a></p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        // Initialize form validation
        ui.initFormValidation('register-form');

        // Password strength meter
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.match(/[A-Z]/) && val.match(/[0-9]/)) strength++;
            if (val.match(/[^A-Za-z0-9]/)) strength++;

            strengthBar.className = 'strength-bar';
            if (val.length === 0) {
                strengthText.textContent = 'Password strength';
            } else if (strength === 1) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Weak password 🔴';
            } else if (strength === 2) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Medium password 🟡';
            } else if (strength === 3) {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Strong password 🟢';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const registerBtn = document.getElementById('register-btn');
            const authCard = document.querySelector('.auth-card');
            
            ui.setLoading(registerBtn, true);

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Registration failed');

                auth.saveToken(data.token, data.user);
                showToast('Registration successful! ✅', 'success');
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin' ? '/admin.html' : (data.user.role === 'faculty' ? '/faculty.html' : '/student.html');
                }, 500);

            } catch (err) {
                authCard.classList.add('shake');
                setTimeout(() => authCard.classList.remove('shake'), 500);
                showToast(err.message, 'error');
            } finally {
                ui.setLoading(registerBtn, false);
            }
        });

        document.getElementById('google-register-btn').addEventListener('click', () => {
            window.location.href = '/api/auth/google';
        });

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark-mode');
            localStorage.setItem('pdrs_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
        }

        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁' : '🙈';
        });
        
        if (localStorage.getItem('pdrs_theme') === 'dark') {
            document.getElementById('theme-btn').textContent = '☀️';
        }

        (async function handleGoogleRedirect() {
            const hash = window.location.hash || '';
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            const errorBox = document.getElementById('error-box');
            if (error === 'google-failed') {
                errorBox.textContent = 'Google signup failed. Please try again.';
                errorBox.style.display = 'block';
            }

            if (!hash.startsWith('#token=')) return;
            const token = decodeURIComponent(hash.replace('#token=', ''));
            try {
                const meRes = await fetch('/api/auth/me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const meData = await meRes.json();
                if (!meRes.ok || !meData.user) throw new Error('Failed to load user profile');
                auth.saveToken(token, meData.user);
                history.replaceState(null, '', window.location.pathname);
                window.location.href = meData.user.role === 'admin' ? '/admin.html' : (meData.user.role === 'faculty' ? '/faculty.html' : '/student.html');
            } catch (err) {
                errorBox.textContent = 'Google signup failed. Please register again.';
                errorBox.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
