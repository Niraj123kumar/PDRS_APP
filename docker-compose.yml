version: '3.9'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - pdrs_data:/app/data
      - pdrs_backups:/app/backups
      - pdrs_uploads:/app/uploads
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pdrs_data:
  pdrs_backups:
  pdrs_uploads:
  redis_data:
